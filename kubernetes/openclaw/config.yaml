apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true
        }
      },
      "models": {
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama.ollama.svc.cluster.local:11434",
            "api": "ollama",
            "models": [
              {
                "id": "deepseek-r1:1.5b",
                "name": "Deepseek R1 1.5B",
                "reasoning": true,
                "input": ["text"],
                cost: { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                "contextWindow": 8192,
                "maxTokens": 81920
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "ollama/deepseek-r1:1.5b"
          },
          "workspace": "~/.openclaw/workspace"
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "channels": {
        "discord": {
          "enabled": true,
          "token": {
            "source": "env",
            "provider": "default",
            "id": "DISCORD_BOT_TOKEN"
          }
        }
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.