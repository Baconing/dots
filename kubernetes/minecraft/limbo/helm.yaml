apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: limbo
  namespace: minecraft
spec:
  interval: 5m
  chart:
    spec:
      chart: minecraft
      version: 5.1.2
      sourceRef:
        kind: HelmRepository
        name: itzg
        namespace: flux-system
  values:
    image:
      repository: itzg/minecraft-server
      tag: 2026.5.0-java21-jdk
      pullPolicy: IfNotPresent

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 512Mi

    extraEnv:
      - name: INIT_MEMORY
        value: "128M"
      - name: MAX_MEMORY
        value: "512M"

    minecraftServer:
      eula: "TRUE"
      type: LIMBO
      LIMBO_BUILD: latest

    persistence:
      dataDir:
        enabled: false

    serviceAnnotations:
      mc-router.itzg.me/defaultServer: "true"