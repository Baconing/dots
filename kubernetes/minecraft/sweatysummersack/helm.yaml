apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sweatysummersack
  namespace: minecraft
spec:
  interval: 5m
  chart:
    spec:
      chart: minecraft
      version: 5.1.2
      sourceRef:
        kind: HelmRepository
        name: itzg
        namespace: flux-system
  values:
    image:
      repository: itzg/minecraft-server
      tag: 2026.5.0-java25-jdk
      pullPolicy: IfNotPresent
      
    resources:
      requests:
        cpu: 256m
        memory: 2048Mi
      limits:
        cpu: 2
        memory: 8192Mi

    workloadAsStatefulSet: true

    minecraftServer:
      eula: "TRUE"
      version: 26.1.1
      type: PURPUR
      difficulty: hard
      whitelist: "Baconing,Kamieo_"
      ops: "Baconing"
      enableCommandBlock: true
      spawnProtection: -1

    persistence:
      storageClass: longhorn
      dataDir:
        enabled: true
        Size: 16Gi
        accessModes:
          - ReadWriteOnce

    serviceAnnotations:
      mc-router.itzg.me/externalServerName: sweatysummersack.saturn.ci