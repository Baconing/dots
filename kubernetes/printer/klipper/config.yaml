apiVersion: v1
kind: ConfigMap
metadata:
  name: klipper-config
  namespace: printer
data:
  printer.cfg: |
    [include ../kamp/Configuration/Adaptive_Meshing.cfg]
    [include ../kamp/Configuration/Line_Purge.cfg]
    [include ../kamp/Configuration/Smart_Park.cfg]

    [mcu]
    serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
    restart_method: command

    [printer]
    kinematics: cartesian
    max_velocity: 300
    max_accel: 3000
    max_z_velocity: 5
    max_z_accel: 100
    square_corner_velocity: 5

    [stepper_x]
    step_pin: PC2
    dir_pin: PB9
    enable_pin: !PC3
    microsteps: 16
    rotation_distance: 40
    endstop_pin: ^PA5
    position_endstop: 0
    position_max: 235
    homing_speed: 50

    [stepper_y]
    step_pin: PB8
    dir_pin: PB7
    enable_pin: !PC3
    microsteps: 16
    rotation_distance: 40
    endstop_pin: ^PA6
    position_endstop: 0
    position_max: 235
    homing_speed: 50

    [stepper_z]
    step_pin: PB6
    dir_pin: !PB5
    enable_pin: !PC3
    microsteps: 16
    rotation_distance: 7.921
    # endstop_pin: ^PA7
    endstop_pin: probe:z_virtual_endstop
    position_min: -5
    position_max: 250

    [extruder]
    max_extrude_only_distance: 100.0
    step_pin: PB4
    dir_pin: PB3
    enable_pin: !PC3
    microsteps: 16
    rotation_distance: 6.809

    nozzle_diameter: 0.400
    filament_diameter: 1.750

    pressure_advance: 0.0525

    heater_pin: PA1
    sensor_type: EPCOS 100K B57560G104F
    sensor_pin: PC5
    min_temp: 0
    max_temp: 250

    control: pid
    pid_Kp: 25.80
    pid_Ki: 2.50
    pid_Kd: 66.64

    [heater_bed]
    heater_pin: PA2
    sensor_type: EPCOS 100K B57560G104F
    sensor_pin: PC4
    min_temp: 0
    max_temp: 130

    control: pid
    pid_Kp: 198.96
    pid_Ki: 38.80
    pid_Kd: 680.25

    [fan]
    pin: PA0

    [bltouch]
    sensor_pin: ^PB1
    control_pin: PB0
    
    x_offset: -46
    y_offset: -26
    
    z_offset: -0.0
    
    speed: 10
    samples: 2
    sample_retract_dist: 3.0
    lift_speed: 40
    samples_result: median
    samples_tolerance: 0.050
    samples_tolerance_retries: 3

    [safe_z_home]
    home_xy_position: 157, 143
    speed: 80
    z_hop: 10
    z_hop_speed: 10

    [bed_mesh]
    speed: 200
    horizontal_move_z: 5
    mesh_min: 20, 20
    mesh_max: 169, 189
    probe_count: 6, 6
    algorithm: bicubic
    fade_start: 1
    fade_end: 10
    fade_target: 0

    [bed_screws]
    screw1: 30.5, 37
    screw1_name: front left
    screw2: 30.5, 207
    screw2_name: rear left
    screw3: 204.5, 207
    screw3_name: rear right
    screw4: 204.5, 37
    screw4_name: front right

    [screws_tilt_adjust]
    screw1: 74.5, 42
    screw1_name: front left
    screw2: 74.5, 212
    screw2_name: rear left
    screw3: 248.5, 212
    screw3_name: rear right
    screw4: 248.5, 42
    screw4_name: front right
    horizontal_move_z: 10
    speed: 80
    screw_thread: CW-M4

    [display]
    lcd_type: st7920
    cs_pin: PB12
    sclk_pin: PB13
    sid_pin: PB15
    encoder_pins: ^PB14, ^PB10
    click_pin: ^!PB2
  
    [virtual_sdcard]
    path: /data/gcodes

    [pause_resume]
    recover_velocity: 50

    [exclude_object]

    [display_status]

    [gcode_macro PAUSE]
    rename_existing: BASE_PAUSE
    gcode:
        SAVE_GCODE_STATE NAME=PAUSE_STATE
        BASE_PAUSE
        G91
        G1 E-2 F2700
        G1 Z10 F3000
        G90
        G1 X10 Y220 F5000

    [gcode_macro RESUME]
    rename_existing: BASE_RESUME
    gcode:
        G91
        G1 E2 F2700
        RESTORE_GCODE_STATE NAME=PAUSE_STATE
        BASE_RESUME

    [gcode_macro CANCEL_PRINT]
    rename_existing: BASE_CANCEL_PRINT
    gcode:
        G91
        G1 E-2 F2700
        G1 Z10 F3000
        G90
        G1 X0 Y220 F3000
        M104 S0
        M140 S0
        M106 S0
        M84
        BASE_CANCEL_PRINT

    [gcode_macro START_PRINT]
    description: Called by OrcaSlicer start G-code
    gcode:
        {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
        {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

        G90                               ; absolute coordinates
        M83                               ; extruder relative mode
        M140 S{BED_TEMP}                  ; start bed heating
        M104 S150                         ; preheat hotend to no-ooze temp

        G28                               ; home all axes
        BED_MESH_CALIBRATE                ; auto level (replaces G29)

        SMART_PARK

        M190 S{BED_TEMP}                  ; wait for bed
        M109 S{EXTRUDER_TEMP}             ; wait for hotend

        LINE_PURGE ; purge line

    [gcode_macro END_PRINT]
    description: Called by OrcaSlicer end G-code
    gcode:
        {% set max_z = printer.toolhead.position.z %}
        {% set printable_height = printer.toolhead.axis_maximum.z %}

        ; raise Z — mirroring your original conditional raise logic
        G91
        G1 Z{[2, printable_height - max_z]|min} F600
        G90

        G1 X5 Y{printable_height * 0.8} F9000   ; present print

        M140 S0                           ; bed off
        M104 S0                           ; hotend off
        M107                              ; fan off
        M84 X Y E                         ; disable motors (keep Z holding)

    [gcode_macro _KAMP_Settings]
    variable_verbose_enable: False

    variable_mesh_margin: 0
    fariable_fuzz_amount: 0

    variable_probe_dock_enable: False

    variable_purge_height: 0.28
    variable_tip_distance: 0
    variable_purge_margin: 10
    variable_purge_amount: 30
    variable_flow_rate: 12

    variable_smart_park_height: 50

    gcode:
        {action_respond_info(" Running the KAMP_Settings macro does nothing, it is only used for storing KAMP settings. ")}
  moonraker.conf: |
    [server]
    host: 0.0.0.0
    port: 7125
    route_prefix: moonraker
    klippy_uds_address: /run/klipper/klipper.sock
    
    [machine]
    provider: none
    validate_service: false
    validate_config: false

    [authorization]
    cors_domains: *

    [file_manager]
    queue_gcode_uploads: true
    enable_object_processing: true

    [octoprint_compat]
    enable_ufp: true

    [webcam Default]
    location: printer
    enabled: True
    service: webrtc-go2rtc
    target_fps: 60
    webrtc_url: api/webrtc?src=webcam
    stream_url: api/stream.mjpeg?src=webcam
    snapshot_url: api/frame.jpeg?src=webcam

    [update_manager]
    enable_auto_refresh: true
    enable_system_updates: false
    channel: stable

    [update_manager kamp]
    type: git_repo
    channel: stable
    origin: https://github.com/kyleisah/Klipper-Adaptive-Meshing-Purging.git
    primary_branch: main
    managed_services: klipper
    path: /opt/printer_data/kamp