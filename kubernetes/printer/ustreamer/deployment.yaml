apiVersion: apps/v1
kind: Deployment
metadata:
  name: &appName ustreamer
  namespace: printer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: *appName
  template:
    metadata:
      labels:
        app: *appName
    spec:
      securityContext:
        supplementalGroups:
          - 26 # tape group for video
      containers:
        - name: *appName
          image: mkuf/ustreamer:v6.56
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            privileged: true
          ports:
            - containerPort: &httpPort 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: *httpPort
          readinessProbe:
            httpGet:
              path: /
              port: *httpPort
      
