apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jameswynn
  namespace: flux-system
spec:
  interval: 1h
  url: http://jameswynn.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 5m
  chart:
    spec:
      chart: homepage
      version: 2.1.0
      sourceRef:
        kind: HelmRepository
        name: jameswynn
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/gethomepage/homepage
      tag: v1.12.3
    enableRbac: true
    serviceAccount:
      create: true
    ingress:
      main:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          kubernetes.io/ingress.class: traefik
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
          external-dns.alpha.kubernetes.io/hostname: saturn.ong
          external-dns.alpha.kubernetes.io/target: direct.saturn.ong
        hosts:
          - host: "saturn.ong"
            paths:
              - path: "/"
                pathType: Prefix
        tls:
          - secretName: saturn.ong-tls
            hosts:
              - saturn.ong
    config:
      settings:
        title: "Saturn"
        startUrl: https://saturn.ong
        layout:
          - Media:
            style: row
            columns: 4
          - Home:
            style: row
            columns: 4
          - AI:
            style: row
            columns: 4
          - Network:
            style: row
            columns: 4
          - Storage:
            style: row
            columns: 4
          - Security:
            style: row
            columns: 4
          - Cluster:
            style: row
            columns: 4
      widgets:
        - resources:
            backend: kubernetes
            expanded: true
            cpu: true
            memory: true
        - search:
            provider: google
            target: _blank
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "cluster"
            nodes:
              show: true
              cpu: true
              memory: true
              showLabel: true
      bookmarks: []
      services: []
      kubernetes:
        mode: cluster
        ingress: true
        traefik: true

    env:
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: "saturn.ong"
    resources:
      requests:
        memory: 10Mi
        cpu: 10m
      limits:
        memory: 200Mi
        cpu: 500m