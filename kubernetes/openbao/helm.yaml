apiVersion: v1
kind: Namespace
metadata:
  name: openbao
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openbao
  namespace: flux-system
spec:
  interval: 1h
  url: https://openbao.github.io/openbao-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao
spec:
  interval: 5m
  chart:
    spec:
      chart: openbao
      version: 0.4.0
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system
  values:
    server:
      ingress:
        ingressClassName: traefik
        enabled: true
        hosts:
          - host: openbao.saturn.ong
            paths: 
              - "/"
        labels:
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
          external-dns.alpha.kubernetes.io/hostname: openbao.saturn.ong
          external-dns.alpha.kubernetes.io/target: direct.saturn.ong
        tls:
          - secretName: openbao.saturn.ong-tls

      standalone:
        config: |
          ui = true

          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "file" {
            path = "/openbao/data"
          }

      dataStorage:
        enabled: true
        size: 16Gi
        storageClass: longhorn
        labels:
          recurring-job-group.longhorn.io/backup: enabled

      auditStorage:
        enabled: true
        size: 4Gi
        storageClass: longhorn

      readinessProbe:
        enabled: true
      livenessProbe:
        enabled: true