apiVersion: v1
kind: Namespace
metadata:
  name: openbao
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openbao
  namespace: flux-system
spec:
  interval: 1h
  url: https://openbao.github.io/openbao-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao
spec:
  interval: 5m
  chart:
    spec:
      chart: openbao
      version: 0.4.0
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system
  values:
    server:
      ingress:
        ingressClassName: traefik
        enabled: true
        hosts:
          - host: openbao.saturn.ong
            paths: []
        labels:
          traefik.ingress.kubernetes.io/router.tls: "true"
          external-dns.alpha.kubernetes.io/hostname: openbao.saturn.ong
          external-dns.alpha.kubernetes.io/target: direct.saturn.ong
        tls:
          - secretName: openbao.saturn.ong-tls

      dataStorage:
        enabled: true
        size: 16Gi
        storageClass: longhorn

      auditStorage:
        enabled: true
        size: 4Gi
        storageClass: longhorn

      ha:
        enabled: true
        raft:
          enabled: true

      readinessProbe:
        enabled: true
      livenessProbe:
        enabled: true
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openbao
  namespace: openbao
spec:
  secretName: openbao.saturn.ong-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - openbao.saturn.ong