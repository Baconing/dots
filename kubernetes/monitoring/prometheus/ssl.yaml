apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-alert-manager
  namespace: monitoring
spec:
  secretName: alerts.saturn.ong-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - alerts.saturn.ong
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus
  namespace: monitoring
spec:
  secretName: prometheus.saturn.ong-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - prometheus.saturn.ong
