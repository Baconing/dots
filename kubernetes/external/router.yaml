apiVersion: v1
kind: Service
metadata:
  name: router-external
  namespace: external
spec:
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: router-external
  namespace: external
  labels:
    kubernetes.io/service-name: router-external
addressType: IPv4
ports:
  - name: http
    appProtocol: http
    protocol: TCP
    port: 80
endpoints:
  - addresses:
      - "10.10.0.1"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: router-external
  namespace: external
spec:
  secretName: router.saturn.ong-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - router.saturn.ong
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: router-external
  namespace: external
  annotations:
    kubernetes.io/ingress.class: traefik
    hajimari.io/enable: "true"
    hajimari.io/appName: Router
    hajimari.io/group: Network
    hajimari.io/icon: mdi:router-network
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
    external-dns.alpha.kubernetes.io/hostname: router.saturn.ong
    external-dns.alpha.kubernetes.io/target: direct.saturn.ong
spec:
  tls:
    - secretName: router.saturn.ong-tls
      hosts:
        - router.saturn.ong
  rules:
    - host: "router.saturn.ong"
      http:
        paths:
          - path: "/"
            pathType: "Prefix"
            backend:
              service:
                name: router-external
                port:
                  number: 80
