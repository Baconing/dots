apiVersion: v1
kind: Service
metadata:
  name: truenas-external
  namespace: external
spec:
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: truenas-external
  namespace: external
  labels:
    kubernetes.io/service-name: truenas-external
addressType: IPv4
ports:
  - name: http
    appProtocol: http
    protocol: TCP
    port: 80
endpoints:
  - addresses:
      - "10.10.2.2"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: truenas-external
  namespace: external
spec:
  secretName: nas.saturn.ci
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - nas.saturn.ci
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: truenas-external
  namespace: external
  annotations:
    kubernetes.io/ingress.class: traefik
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: NAS
    gethomepage.dev/group: Storage
    gethomepage.dev/icon: truenas
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
    external-dns.alpha.kubernetes.io/enabled: "true"
    external-dns.alpha.kubernetes.io/hostname: nas.saturn.ci
    external-dns.alpha.kubernetes.io/target: direct.saturn.ci
spec:
  tls:
    - secretName: nas.saturn.ci
      hosts:
        - nas.saturn.ci
  rules:
    - host: "nas.saturn.ci"
      http:
        paths:
          - path: "/"
            pathType: "Prefix"
            backend:
              service:
                name: truenas-external
                port:
                  number: 80
