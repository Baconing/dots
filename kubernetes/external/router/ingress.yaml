apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: router
  namespace: external
  annotations:
    kubernetes.io/ingress.class: traefik
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Router
    gethomepage.dev/group: Network
    gethomepage.dev/icon: opnsense
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
spec:
  tls:
    - secretName: router.saturn.ci
      hosts:
        - router.saturn.ci
  rules:
    - host: router.saturn.ci
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: router
                port:
                  number: 80
