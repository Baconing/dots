apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: runix
  namespace: flux-system
spec:
  interval: 1h
  url: https://helm.runix.net/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin4
  namespace: database
spec:
  interval: 5m
  chart:
    spec:
      chart: pgadmin4
      version: 1.62.0
      sourceRef:
        kind: HelmRepository
        name: runix
        namespace: flux-system
  values:
    image:
      registry: docker.io
      repository: dpage/pgadmin4
      tag: 9.14.0

    serverDefinitions:
      enabled: true
      resourceType: Secret
      servers:
        main:
          Name: Main
          Group: Servers
          Username: postgres
          Host: postgres-rw
          Port: 5432
          MaintenanceDB: postgres
          SSLMode: prefer
    
    ingress:
      enabled: true
      ingressClassName: "traefik"
      annotations:
        kubernetes.io/ingress.class: traefik
        traefik.ingress.kubernetes.io/router.tls: "true"
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: pgAdmin
        gethomepage.dev/group: Cluster
        gethomepage.dev/icon: pgadmin
      hosts:
        - host: "pgadmin.saturn.ci"
          paths:
            - path: "/"
              pathType: Prefix
      tls:
        - secretName: "pgadmin.saturn.ci"
          hosts:
            - "pgadmin.saturn.ci"
    
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    
    autoscaling:
      enabled: true
  valuesFrom:
    - kind: Secret
      name: postgres-superuser
      valuesKey: password
      targetPath: serverDefinitions.servers.main.Password