apiVersion: v1
kind: Namespace
metadata:
  name: auth
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: lldap
  namespace: flux-system
spec:
  interval: 1h
  url: https://djjudas21.github.io/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lldap
  namespace: auth
spec:
  interval: 5m
  chart:
    spec:
      chart: lldap
      version: 0.6.3
      sourceRef:
        kind: HelmRepository
        name: lldap
        namespace: flux-system
  values:
    image:
      repository: lldap/lldap
      tag: "2026-03-04"
      variant: ""

    lldap:
      baseDN: DC=saturn,DC=ci
      secretName: lldap
      ldapUserDN: "admin"

    ingress:
      enabled: true
      name: "lldap"
      ingressClassName: "traefik"
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: LLDAP
        gethomepage.dev/group: Security
        gethomepage.dev/icon: lldap
        traefik.ingress.kubernetes.io/router.tls: "true"
        external-dns.alpha.kubernetes.io/hostname: ldap.saturn.ci
        external-dns.alpha.kubernetes.io/target: direct.saturn.ci
      hosts:
        - host: "ldap.saturn.ci"
          paths:
            - path: "/"
              pathType: Prefix
      tls:
        - secretName: "ldap.saturn.ci"
          hosts:
            - "ldap.saturn.ci"

    externalPostgresql:
      enabled: true
      fromSecret: lldap
      uriKey: postgresqlUri
  valuesFrom:
    - kind: Secret
      name: lldap-bootstrap