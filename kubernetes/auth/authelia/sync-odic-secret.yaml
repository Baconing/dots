apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sync-oidc-secret-to-auth
  annotations:
    policies.kyverno.io/title: Sync OIDC Secret to Auth Namespace
    policies.kyverno.io/description: >-
      Watches for a Secret named "odic" in any namespace. When found,
      generates a copy in the "auth" namespace named "odic-{source-namespace}".
spec:
  rules:
    - name: sync-oidc-secret
      match:
        any:
          - resources:
              kinds:
                - Secret
              names:
                - odic
      exclude:
        any:
          - resources:
              namespaces:
                - auth        # prevent triggering on the copies themselves
      generate:
        apiVersion: v1
        kind: Secret
        name: "odic-{{request.object.metadata.namespace}}"
        namespace: auth
        synchronize: true     # keep the copy in sync with the source
        data:
          metadata:
            labels:
              kyverno.io/source-namespace: "{{request.object.metadata.namespace}}"
          type: "{{request.object.type}}"
          data: "{{request.object.data}}"