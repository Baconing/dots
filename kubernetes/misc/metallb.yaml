apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: metallb-system
spec:
  addresses: [ "10.10.254.254/32" ]
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2advertisement
  namespace: metallb-system
spec:
  ipAddressPools: [ "homelab-pool" ]