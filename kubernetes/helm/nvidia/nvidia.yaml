apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nvidia
  namespace: flux-system
spec:
  interval: 1h
  url: https://helm.ngc.nvidia.com/nvidia
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: gpu-operator
      version: 25.10.1
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system