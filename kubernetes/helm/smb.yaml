apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: smb
  namespace: flux-system
spec:
  interval: 1h
  url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-smb/master/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: smb
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: csi-driver-smb
      version: 1.19.1
      sourceRef:
        kind: HelmRepository
        name: smb
        namespace: flux-system