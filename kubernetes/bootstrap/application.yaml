apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/baconing/dots.git
    targetRevision: argocd
    path: kubernetes

  destination:
    server: in-cluster
    namespace: default

  syncPolicy:
    automated:
      prune: false
      selfHeal: true