apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns
  namespace: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-ddns
  template:
    metadata:
      labels:
        app: cloudflare-ddns
    spec:
      containers:
      - name: ddns
        image: oznu/cloudflare-ddns:latest
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: cloudflare-api-token
              key: apiToken
        - name: DOMAINS
          value: "direct.saturn.ong"
        - name: PROXIED
          value: "true"
      restartPolicy: Always