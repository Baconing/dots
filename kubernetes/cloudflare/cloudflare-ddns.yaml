apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns
  namespace: cloudflare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-ddns
  template:
    metadata:
      labels:
        app: cloudflare-ddns
    spec:
      containers:
      - name: ddns
        image: oznu/cloudflare-ddns:latest
        env:
        - name: CLOUDFLARE_API_TOKEN_FILE
          value: "/run/secret/cloudflare-api/apiToken"
        - name: DOMAINS
          value: "direct.saturn.ong"
        - name: PROXIED
          value: "true"
        volumeMounts:
          - name: apiKey
            readOnly: true
            mountPath: "/run/secret/cloudflare-api"
      volumes:
        - name: apiKey
          secret:
            secretName: cloudflare-api-token