apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns
  namespace: cloudflare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-ddns
  template:
    metadata:
      labels:
        app: cloudflare-ddns
    spec:
      containers:
      - name: ddns
        image: oznu/cloudflare-ddns:latest
        env:
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-api
              key: api-token
        - name: ZONE
          value: "saturn.ong"
        - name: RECORD
          value: "direct.saturn.ong"
        - name: PROXIED
          value: "true"
        - name: INTERVAL
          value: "300"
      restartPolicy: Always