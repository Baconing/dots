apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lldap-helm
  namespace: argocd
spec:
  project: default

  source:
    chart: lldap
    repoURL: https://djjudas21.github.io/charts/
    targetRevision: 0.6.4
    helm:
      valuesObject:
        image:
          repository: lldap/lldap
          tag: "2026-03-04"
          variant: ""

        lldap:
          baseDN: DC=saturn,DC=ci
          secretName: lldap
          ldapUserDN: "admin"

        ingress:
          enabled: true
          name: "lldap"
          ingressClassName: "traefik"
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/name: LLDAP
            gethomepage.dev/group: Security
            gethomepage.dev/icon: lldap
            traefik.ingress.kubernetes.io/router.tls: "true"
            external-dns.alpha.kubernetes.io/enabled: "true"
            external-dns.alpha.kubernetes.io/hostname: ldap.saturn.ci
            external-dns.alpha.kubernetes.io/target: direct.saturn.ci
          hosts:
            - host: "ldap.saturn.ci"
              paths:
                - path: "/"
                  pathType: Prefix
          tls:
            - secretName: "ldap.saturn.ci"
              hosts:
                - "ldap.saturn.ci"

        externalPostgresql:
          enabled: true
          fromSecret: lldap
          uriKey: postgresqlUri

        # todo
        # extraInitContainers:
        #   - name: init-db
        #     image: ghcr.io/onedr0p/postgres-init:17.4
        #     env:
        #       - name: INIT_POSTGRES_HOST
        #         value: postgres-rw.database.svc.cluster.local
        #       - name: INIT_POSTGRES_DBNAME
        #         value: *appName
        #       - name: INIT_POSTGRES_SUPER_PASS
        #         valueFrom:
        #           secretKeyRef:
        #             name: postgres-superuser
        #             key: password
        #       - name: INIT_POSTGRES_USER
        #         valueFrom:
        #           secretKeyRef:
        #             name: *appName
        #             key: storage.postgres.username
        #       - name: INIT_POSTGRES_PASS
        #         valueFrom:
        #           secretKeyRef:
        #             name: *appName
        #             key: storage.postgres.password

  destination:
    server: in-cluster
    namespace: auth

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true

  plugin: {}