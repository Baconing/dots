apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 1h
  url: https://kyverno.github.io/kyverno/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 5m
  chart:
    spec:
      chart: kyverno
      version: 3.7.0-rc.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
    values:
      admissionController:
        replicas: 3
      backgroundController:
        replicas: 3
        serviceMonitor:
          enabled: true
          interval: 1m
      cleanupController:
        replicas: 3
        serviceMonitor:
          enabled: true
          interval: 1m
      crds:
        install: true
      grafana:
        enabled: true
      reportsController:
        replicas: 3
        serviceMonitor:
          enabled: true
          interval: 1m
      serviceMonitor:
        enabled: true
        interval: 1m