apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-helm
  namespace: argocd
spec:
  project: default

  source:
    chart: kyverno
    repoURL: https://kyverno.github.io/kyverno/
    targetRevision: 3.8.2
    helm:
      valuesObject:
        admissionController:
          replicas: 3
        
        backgroundController:
          replicas: 3
        
        cleanupController:
          replicas: 3

        reportsController:
          replicas: 3

  destination:
    name: in-cluster
    namespace: kyverno

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true

  plugin: {}