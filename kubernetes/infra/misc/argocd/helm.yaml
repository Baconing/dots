# TODO: Resource Limits

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-helm
  namespace: argocd
spec:
  source:
    chart: argo-cd
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 10.1.3
    helm:
      valuesObject:
        global:
          domain: argocd.saturn.ci
          
          image:
            repository: quay.io/argoproj/argocd
            tag: v3.4.5

          addPrometheusAnnotations: true

        redis-ha:
          enabled: true
        
        controller:
          replicas: 1
        
        server:
          autoscaling:
            enabled: true
            minReplicas: 2
          
          ingress:
            enabled: true
            ingressClassName: traefik
            tls: true
            annotations:
              gethomepage.dev/name: ArgoCD
              gethomepage.dev/group: Infrastructure
              gethomepage.dev/icon: argo-cd
              traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
              external-dns.alpha.kubernetes.io/enabled: "true"
              external-dns.alpha.kubernetes.io/hostname: argocd.saturn.ci
              external-dns.alpha.kubernetes.io/target: direct.saturn.ci
          
        repoServer:
          autoscaling:
            enabled: true
            minReplicas: 2

        applicationSet:
          replicas: 2

  destination:
    server: in-cluster
    namespace: argocd

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true