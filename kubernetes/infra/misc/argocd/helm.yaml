# This is the only Helm Chart not managed by ArgoCD, as it is used to deploy ArgoCD itself.
# It relies on the default Helm Controller provided on install with k3s.
# Do not set --disable-helm-controller when setting up a k3s server or this manifest will not work.


# TODO: Resource limits
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: argocd
  namespace: argocd
spec:
  repo: https://argoproj.github.io/argo-helm
  chart: argo-cd
  version: 10.1.3
  valuesContent: |-
    global:
      domain: argocd.saturn.ci
      
      image:
        repository: quay.io/argoproj/argocd
        tag: v3.4.5

      addPrometheusAnnotations: true

    redis-ha:
      enabled: true
    
    controller:
      replicas: 1
    
    server:
      autoscaling:
        enabled: true
        minReplicas: 2
      
      ingress:
        enabled: true
        ingressClassName: traefik
        tls: true
        annotations:
          gethomepage.dev/name: ArgoCD
          gethomepage.dev/group: Infrastructure
          gethomepage.dev/icon: argo-cd
          traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
          external-dns.alpha.kubernetes.io/enabled: "true"
          external-dns.alpha.kubernetes.io/hostname: argocd.saturn.ci
          external-dns.alpha.kubernetes.io/target: direct.saturn.ci
      
    repoServer:
      autoscaling:
        enabled: true
        minReplicas: 2

    applicationSet:
      replicas: 2