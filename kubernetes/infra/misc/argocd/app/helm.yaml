# TODO: Resource Limits

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-helm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default

  source:
    chart: argo-cd
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 10.1.3
    helm:
      releaseName: argocd
      valuesObject:
        global:
          domain: argocd.saturn.ci
          
          image:
            repository: quay.io/argoproj/argocd
            tag: v3.4.5

          addPrometheusAnnotations: true

        configs:
          cm:
            kustomize.buildOptions: --load-restrictor LoadRestrictionsNone

        redis-ha:
          enabled: true
        
        controller:
          replicas: 1
        
        server:
          autoscaling:
            enabled: true
            minReplicas: 2

          certificate:
            enabled: true
          
          ingress:
            enabled: true
            ingressClassName: traefik
            tls: true
            annotations:
              traefik.ingress.kubernetes.io/router.tls: "true"
              gethomepage.dev/name: ArgoCD
              gethomepage.dev/group: Infrastructure
              gethomepage.dev/icon: argo-cd
              traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
              external-dns.alpha.kubernetes.io/enabled: "true"
              external-dns.alpha.kubernetes.io/hostname: argocd.saturn.ci
              external-dns.alpha.kubernetes.io/target: direct.saturn.ci
          
        repoServer:
          autoscaling:
            enabled: true
            minReplicas: 2
          extraContainers:
            - name: sops
              image: ghcr.io/baconing/argocd-sops-cmp:1.2.0
              securityContext:
                runAsUser: 999
                runAsNonRoot: true
              volumeMounts:
                - name: var-files
                  mountPath: /var/run/argocd
                - name: plugins
                  mountPath: /home/argocd/cmp-server/plugins
                - name: cmp-tmp
                  mountPath: /tmp
                - name: sops-age-key
                  mountPath: /keys
          volumes:
            - name: cmp-tmp
              emptyDir: {}
            - name: sops-age-key
              secret:
                secretName: sops-age-key

        applicationSet:
          replicas: 2

  destination:
    name: in-cluster
    namespace: argocd

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - FailOnSharedResource=true
    automated:
      prune: false
      selfHeal: true