apiVersion: v1
kind: Namespace
metadata:
  name: intel
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: intel
  namespace: flux-system
spec:
  interval: 1h
  url: https://intel.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device
  namespace: intel
spec:
  interval: 5m
  chart:
    spec:
      chart: intel-device-plugins-operator
      version: 0.35.0
      sourceRef:
        kind: HelmRepository
        name: intel
        namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu
  namespace: intel
spec:
  interval: 5m
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: 0.35.0
      sourceRef:
        kind: HelmRepository
        name: intel
        namespace: flux-system
  values:
    nodeSelector:
      intel.feature.node.kubernetes.io/gpu: 'true'
    nodeFeatureRule: true