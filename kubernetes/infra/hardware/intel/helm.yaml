apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intel-device-helm
  namespace: argocd
spec:
  project: default

  source:
    chart: intel-device-plugins-operator
    repoURL: https://intel.github.io/helm-charts
    targetRevision: 0.36.0

  destination:
    name: in-cluster
    namespace: intel

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true

  plugin: {}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intel-gpu-helm
  namespace: argocd
spec:
  project: default

  source:
    chart: intel-device-plugins-gpu
    repoURL: https://intel.github.io/helm-charts
    targetRevision: 0.36.0
    helm:
      valuesObject:
        sharedDevNum: 16
        nodeSelector:
          intel.feature.node.kubernetes.io/gpu: 'true'
        nodeFeatureRule: true

  destination:
    name: in-cluster
    namespace: intel

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true

  plugin: {}