apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-hardware
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/baconing/dots.git
    targetRevision: master
    path: kubernetes/infra

  destination:
    server: in-cluster
    namespace: default

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true

  plugin: {}