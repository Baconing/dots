apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-helm
  namespace: argocd
spec:
  source:
    chart: cert-manager
    repoURL: oci://quay.io/jetstack/charts
    targetRevision: v1.20.3
    helm:
      valuesObject:
        crds:
          enabled: true

  destination:
    server: in-cluster
    namespace: cert-manager

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true