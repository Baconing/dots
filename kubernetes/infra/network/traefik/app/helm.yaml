apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-helm
  namespace: argocd
spec:
  project: default

  source:
    chart: traefik
    repoURL: https://traefik.github.io/charts
    targetRevision: 41.0.2
    helm:
      releaseName: traefik
      valuesObject:
        service:
          spec:
            loadBalancerIP: 10.10.254.0
        api:
          dashboard: true
        ingressRoute:
          dashboard:
            enabled: true
            annotations: 
              kubernetes.io/ingress.class: traefik
              gethomepage.dev/enabled: "true"
              gethomepage.dev/href: "https://traefik.saturn.ci" # Need this when using Traefik IngressRoutes
              gethomepage.dev/name: Traefik
              gethomepage.dev/group: Network
              gethomepage.dev/icon: traefik-proxy
              traefik.ingress.kubernetes.io/router.tls: "true"
              external-dns.alpha.kubernetes.io/enabled: "true"
              external-dns.alpha.kubernetes.io/hostname: traefik.saturn.ci
              external-dns.alpha.kubernetes.io/target: direct.saturn.ci
            matchRule: Host(`traefik.saturn.ci`)
            services:
              - name: api@internal
                kind: TraefikService
            entryPoints: 
              - "websecure"
            middlewares:
              - name: forwardauth-authelia
                namespace: traefik
            tls:
              secretName: traefik.saturn.ci
        ports:
          websecure:
            http:
              middlewares:
                - traefik-forwardauth-authelia@kubernetescrd

  destination:
    name: in-cluster
    namespace: traefik

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - FailOnSharedResource=true
    automated:
      prune: true
      selfHeal: true

  
