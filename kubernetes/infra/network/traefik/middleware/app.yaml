apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-middleware
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/baconing/dots.git
    targetRevision: master
    path: kubernetes/infra/network/traefik/middleware

  destination:
    server: in-cluster
    namespace: traefik

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true

  plugin: {}