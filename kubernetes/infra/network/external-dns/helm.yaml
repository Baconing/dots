apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-helm
  namespace: argocd
spec:
  source:
    chart: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    targetRevision: 1.21.1
    helm:
      valuesObject:
        sources:
          - ingress

        annotationFilter: "external-dns.alpha.kubernetes.io/enabled=true"

        provider:
          name: cloudflare
        extraArgs:
          - --cloudflare-proxied
        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-token
                key: apiToken
          - name: CF_API_EMAIL
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-token
                key: email

  destination:
    server: in-cluster
    namespace: external-dns

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true