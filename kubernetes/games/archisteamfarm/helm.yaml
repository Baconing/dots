apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: juniorjpdj
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/juniorjpdj/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: archisteamfarm
  namespace: archisteamfarm
spec:
  interval: 5m
  chart:
    spec:
      chart: archisteamfarm
      version: 0.1.122
      sourceRef:
        kind: HelmRepository
        name: juniorjpdj
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/justarchinet/archisteamfarm
      tag: 6.3.7.0

    persistence:
      data:
        enabled: true
        storageClass: longhorn
        size: 100Mi
    
    ingress:
      main:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: traefik
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: ArchiSteamFarm
          gethomepage.dev/group: Games
          gethomepage.dev/icon: archisteamfarm
          traefik.ingress.kubernetes.io/router.tls: "true"
          external-dns.alpha.kubernetes.io/enabled: "true"
          external-dns.alpha.kubernetes.io/hostname: &host asf.saturn.ci
          external-dns.alpha.kubernetes.io/target: direct.saturn.ci
        hosts:
          - host: *host
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: asf.saturn.ci
            hosts:
              - *host
  valuesFrom:
    - kind: Secret
      name: archisteamfarm