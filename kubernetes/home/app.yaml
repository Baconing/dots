apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/baconing/dots.git
    targetRevision: master
    path: kubernetes/home

  destination:
    server: in-cluster
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true