apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless-helm
  namespace: argocd
spec:
  source:
    chart: paperless-ngx
    repoURL: https://charts.gabe565.com
    targetRevision: 0.24.1
    helm:
      valuesObject:
        image:
          repository: ghcr.io/paperless-ngx/paperless-ngx
          tag: 2.20.15
        envFrom:
          - secretRef:
              name: paperless-ngx
        env:
          TZ: "America/Detroit"

          PAPERLESS_DBENGINE: postgresql
          PAPERLESS_DBHOST: postgres
          PAPERLESS_DBNAME: paperless
          PAPERLESS_DBUSER: paperless
        initContainers:
          init-db:
            image: 
              repository: ghcr.io/onedr0p/postgres-init
              tag: 17.4
            env:
              - name: INIT_POSTGRES_HOST
                value: postgres-rw.database.svc.cluster.local
              - name: INIT_POSTGRES_DBNAME
                value: paperless
              - name: INIT_POSTGRES_USER
                value: paperless
              - name: INIT_POSTGRES_PASS
                valueFrom:
                  secretKeyRef:
                    name: paperless-secret
                    key: PAPERLESS_DBPASS
              - name: INIT_POSTGRES_SUPER_PASS
                valueFrom:
                  secretKeyRef:
                    name: postgres-superuser
                    key: password
        persistence:
          data:
            enabled: true
            retain: true
            storageClass: longhorn
            accessMode: ReadWriteOnce
            size: 512Mi
          media:
            enabled: true
            existingClaim: paperless-media
          consume:
            enabled: true
            existingClaim: paperless-consume
          export:
            enabled: true
            existingClaim: paperless-export
        redis:
          enabled: true
          metrics:
            enabled: true
        ingress:
          main:
            enabled: true
          annotations:
            kubernetes.io/ingress.class: traefik
            gethomepage.dev/enabled: "true"
            gethomepage.dev/name: Paperless-ngx
            gethomepage.dev/group: Home
            gethomepage.dev/icon: paperless-ngx
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
            external-dns.alpha.kubernetes.io/enabled: "true"
            external-dns.alpha.kubernetes.io/hostname: paperless.saturn.ci
            external-dns.alpha.kubernetes.io/target: direct.saturn.ci
          hosts:
            - host: paperless.saturn.ci
              paths: ["/"]
          tls:
            - secretName: paperless.saturn.ci
              hosts: ["paperless.saturn.ci"]

  destination:
    server: in-cluster
    namespace: paperless

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true

  plugin: {}