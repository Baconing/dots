apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: archisteamfarm-helm
  namespace: argocd
spec:
  project: default

  source:
    chart: archisteamfarm
    repoURL: https://juniorjpdj.github.io/charts
    targetRevision: 0.1.127
    helm:
      releaseName: archisteamfarm
      valuesObject:
        image:
          repository: ghcr.io/justarchinet/archisteamfarm
          tag: 6.3.8.3

        persistence:
          data:
            enabled: true
            storageClass: longhorn
            size: 100Mi
        
        ingress:
          main:
            enabled: true
            annotations:
              kubernetes.io/ingress.class: traefik
              gethomepage.dev/enabled: "true"
              gethomepage.dev/name: ArchiSteamFarm
              gethomepage.dev/group: Games
              gethomepage.dev/icon: archisteamfarm
              traefik.ingress.kubernetes.io/router.tls: "true"
              external-dns.alpha.kubernetes.io/enabled: "true"
              external-dns.alpha.kubernetes.io/hostname: &host asf.saturn.ci
              external-dns.alpha.kubernetes.io/target: direct.saturn.ci
            hosts:
              - host: *host
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: http
            tls:
              - secretName: asf.saturn.ci
                hosts:
                  - *host

  destination:
    name: in-cluster
    namespace: archisteamfarm

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - FailOnSharedResource=true
    automated:
      prune: true
      selfHeal: true

  