apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: archisteamfarm
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/baconing/dots.git
    targetRevision: argocd
    path: kubernetes/home/games/archisteamfarm/app

  destination:
    name: in-cluster
    namespace: archisteamfarm

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - FailOnSharedResource=true
    automated:
      prune: true
      selfHeal: true

  