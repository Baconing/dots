apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: beammp
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/baconing/dots.git
    targetRevision: master
    path: kubernetes/home/games/beammp

  destination:
    server: in-cluster
    namespace: beammp

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true