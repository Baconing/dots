apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft-sweatysummersack-helm
  namespace: argocd
spec:
  project: default

  source:
    chart: minecraft
    repoURL: https://itzg.github.io/minecraft-server-charts/
    targetRevision: 5.1.3
    helm:
      valuesObject:
        image:
          repository: itzg/minecraft-server
          tag: 2026.7.0-java25-jdk
          pullPolicy: IfNotPresent

        resources:
          requests:
            cpu: 256m
            memory: 256Mi
          limits:
            cpu: 2
            memory: 8192Mi

        extraEnv:
          INIT_MEMORY: 256M
          MAX_MEMORY: 8192M

        workloadAsStatefulSet: true
        strategyType: OnDelete

        minecraftServer:
          eula: "TRUE"
          version: 26.1.2
          type: PAPER
          difficulty: hard
          whitelist: "Baconing,Kamieo_"
          ops: "Baconing"
          enableCommandBlock: true
          spawnProtection: -1

          motd: "holy its the summer minecraft server called sweatysummersack hashtag sweaty summer time my sack is sweaty"

        persistence:
          storageClass: longhorn
          dataDir:
            enabled: true
            Size: 16Gi
            accessModes:
              - ReadWriteOnce

        serviceAnnotations:
          mc-router.itzg.me/externalServerName: sweatysummersack.saturn.ci,sweatysummersack.local
          external-dns.alpha.kubernetes.io/enabled: "true"
          external-dns.alpha.kubernetes.io/hostname: sweatysummersack.saturn.ci
          external-dns.alpha.kubernetes.io/target: direct.saturn.ci
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"

  destination:
    name: in-cluster
    namespace: minecraft

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - FailOnSharedResource=true
    automated:
      prune: false
      selfHeal: true

  plugin: {}