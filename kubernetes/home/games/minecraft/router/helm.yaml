apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft-router-helm
  namespace: argocd
spec:
  source:
    chart: mc-router
    repoURL: https://itzg.github.io/minecraft-server-charts/
    targetRevision: 1.5.0
    helm:
      valuesObject:
        image:
          repository: itzg/mc-router
          tag: 1.44.0

        services:
          minecraft:
            type: LoadBalancer
            loadBalancerIP: 10.10.254.30
            port: 25565
        
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi

        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 5
          targetCPUUtilizationPercentage: 80
          targetMemoryUtilizationPercentage: 80

        minecraftRouter:
          autoScale:
            up:
              enabled: true
            down:
              enabled: true
              after: 336h # 2 weeks

  destination:
    server: in-cluster
    namespace: minecraft

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true

  plugin: {}
    