apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft-router
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/baconing/dots.git
    targetRevision: master
    path: kubernetes/home/games/minecraft/router

  destination:
    server: in-cluster
    namespace: minecraft

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true

  plugin: {}