apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: games
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/baconing/dots.git
    targetRevision: argocd
    path: kubernetes/home/games

  destination:
    name: in-cluster
    namespace: default

  syncPolicy:
    automated:
      prune: false
      selfHeal: true

  plugin: {}