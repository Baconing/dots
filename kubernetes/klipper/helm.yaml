apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nadiamoe
  namespace: flux-system
spec:
  type: "oci"
  interval: 1h
  url: oci://ghcr.io/nadiamoe/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: klipper
  namespace: klipper
spec:
  interval: 5m
  chart:
    spec:
      chart: kubeklipper
      version: 0.12.144
      sourceRef:
        kind: HelmRepository
        name: nadiamoe
        namespace: flux-system
  values:
    klipper:
      nodeSelector:
        "feature.node.kubernetes.io/ender3": "true"

      podSecurityContext:
        supplementalGroups: 
          - 20 # dialout group, for serial access
          - 27 # this lying bruh

      klipper:
        image:
          repository: mkuf/klipper
          tag: "v0.13.0"

        # I don't want klipper to run out of resources. It's probably the number one priority on the cluster when printing.
        #  That said, I don't know how much it actually needs, so these are worst case really.
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 4
            memory: 4Gi

        securityContext:
          privileged: true

        config: |
          [mcu]
          serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
          restart_method: command

          [printer]
          kinematics: cartesian
          max_velocity: 750
          max_accel: 3000
          max_z_velocity: 5
          max_z_accel: 100
          square_corner_velocity: 5

          [stepper_x]
          step_pin: PC2
          dir_pin: PB9
          enable_pin: !PC3
          microsteps: 16
          rotation_distance: 40
          endstop_pin: ^PA5
          position_endstop: 0
          position_max: 235
          homing_speed: 50

          [stepper_y]
          step_pin: PB8
          dir_pin: PB7
          enable_pin: !PC3
          microsteps: 16
          rotation_distance: 40
          endstop_pin: ^PA6
          position_endstop: 0
          position_max: 235
          homing_speed: 50

          [stepper_z]
          step_pin: PB6
          dir_pin: !PB5
          enable_pin: !PC3
          microsteps: 16
          rotation_distance: 7.921
          # endstop_pin: ^PA7
          endstop_pin: probe:z_virtual_endstop
          position_min: -5
          position_max: 250

          [extruder]
          max_extrude_only_distance: 100.0
          step_pin: PB4
          dir_pin: PB3
          enable_pin: !PC3
          microsteps: 16
          rotation_distance: 6.809

          nozzle_diameter: 0.400
          filament_diameter: 1.750

          heater_pin: PA1
          sensor_type: EPCOS 100K B57560G104F
          sensor_pin: PC0
          min_temp: 0
          max_temp: 250

          control: pid
          pid_Kp: 25.80
          pid_Ki: 2.50
          pid_Kd: 66.64

          [heater_bed]
          heater_pin: PA2
          sensor_type: EPCOS 100K B57560G104F
          sensor_pin: PC4
          min_temp: 0
          max_temp: 130

          control: pid
          pid_Kp: 198.96
          pid_Ki: 38.80
          pid_Kd: 680.25

          [fan]
          pin: PA0

          [bltouch]
          sensor_pin: ^PB1
          control_pin: PB0
          
          x_offset: -46
          y_offset: -26
          
          z_offset: 0.52
          
          speed: 10
          samples: 2
          sample_retract_dist: 3.0
          lift_speed: 40
          samples_result: median
          samples_tolerance: 0.050
          samples_tolerance_retries: 3

          [safe_z_home]
          home_xy_position: 157, 143
          speed: 80
          z_hop: 10
          z_hop_speed: 10

          [bed_mesh]
          speed: 200
          horizontal_move_z: 5
          mesh_min: 5, 5
          mesh_max: 230, 230
          probe_count: 6, 6
          algorithm: bicubic
          fade_start: 1
          fade_end: 10
          fade_target: 0

          [bed_screws]
          screw1: 30.5, 37
          screw1_name: front left
          screw2: 30.5, 207
          screw2_name: rear left
          screw3: 204.5, 207
          screw3_name: rear right
          screw4: 204.5, 37
          screw4_name: front right

          [screws_tilt_adjust]
          screw1: 74.5, 42
          screw1_name: front left
          screw2: 74.5, 212
          screw2_name: rear left
          screw3: 248.5, 212
          screw3_name: rear right
          screw4: 248.5, 42
          screw4_name: front right
          horizontal_move_z: 10
          speed: 80
          screw_thread: CW-M4

          [display]
          lcd_type: st7920
          cs_pin: PB12
          sclk_pin: PB13
          sid_pin: PB15
          encoder_pins: ^PB14, ^PB10
          click_pin: ^!PB2
        
          [virtual_sdcard]
          path: /data/gcodes

          [pause_resume]
          recover_velocity: 50

          [exclude_object]

          [display_status]

          [gcode_macro PAUSE]
          rename_existing: BASE_PAUSE
          gcode:
              SAVE_GCODE_STATE NAME=PAUSE_STATE
              BASE_PAUSE
              G91
              G1 E-2 F2700
              G1 Z10 F3000
              G90
              G1 X10 Y220 F5000

          [gcode_macro RESUME]
          rename_existing: BASE_RESUME
          gcode:
              G91
              G1 E2 F2700
              RESTORE_GCODE_STATE NAME=PAUSE_STATE
              BASE_RESUME

          [gcode_macro CANCEL_PRINT]
          rename_existing: BASE_CANCEL_PRINT
          gcode:
              G91
              G1 E-2 F2700
              G1 Z10 F3000
              G90
              G1 X0 Y220 F3000
              M104 S0
              M140 S0
              M106 S0
              M84
              BASE_CANCEL_PRINT

          [gcode_macro START_PRINT]
          description: Called by OrcaSlicer start G-code
          gcode:
              {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
              {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

              G90                               ; absolute coordinates
              M83                               ; extruder relative mode
              M140 S{BED_TEMP}                  ; start bed heating
              M104 S150                         ; preheat hotend to no-ooze temp

              G28                               ; home all axes
              BED_MESH_CALIBRATE                ; auto level (replaces G29)

              G1 Z50 F240
              G1 X2 Y10 F3000

              M190 S{BED_TEMP}                  ; wait for bed
              M109 S{EXTRUDER_TEMP}             ; wait for hotend

              ; purge line
              G1 Z0.28 F240
              G92 E0
              G1 Y140 E10 F1500
              G1 X2.3 F5000
              G92 E0
              G1 Y10 E10 F1200
              G92 E0

          [gcode_macro END_PRINT]
          description: Called by OrcaSlicer end G-code
          gcode:
              {% set max_z = printer.toolhead.position.z %}
              {% set printable_height = printer.toolhead.axis_maximum.z %}

              ; raise Z — mirroring your original conditional raise logic
              G91
              G1 Z{[2, printable_height - max_z]|min} F600
              G90

              G1 X5 Y{printable_height * 0.8} F9000   ; present print

              M140 S0                           ; bed off
              M104 S0                           ; hotend off
              M107                              ; fan off
              M84 X Y E                         ; disable motors (keep Z holding)

      moonraker:
        image:
          repository: mkuf/moonraker
          tag: "v0.8.0"

        securityContext:
          capabilities:
            drop:
            - ALL

        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 500m
            memory: 512Mi

        persistence:
          data:
            persistentVolumeClaim:
              claimName: moonraker-data

        config:
          server:
            host: 0.0.0.0
            port: 7125
            klippy_uds_address: /run/klipper/klipper.sock
          machine:
            provider: none
            validate_service: false
            validate_config: false
          authorization:
            force_logins: True
            cors_domains: "https://mainsail.saturn.ci"
          file_manager:
            queue_gcode_uploads: True
            check_klipper_config_path: False
            enable_object_processing: true
          octoprint_compat:
            enable_ufp: true

      ingress:
        enabled: true
        className: "traefik"
        annotations: 
          kubernetes.io/ingress.class: traefik
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: moonraker.saturn.ci
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: moonraker.saturn.ci
            hosts:
              - moonraker.saturn.ci
    mainsail:
      enabled: true

      image:
        repository: ghcr.io/mainsail-crew/mainsail
        tag: "v2.14.0"

      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 128Mi

      config:
        defaultLocale: en
        defaultMode: dark
        defaultTheme: mainsail
        hostname: moonraker.saturn.ci
        port: 443
        path: /

      ingress:
        enabled: true
        className: "traefik"
        annotations:
          kubernetes.io/ingress.class: traefik
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Mainsail
          gethomepage.dev/group: Home
          gethomepage.dev/icon: mainsail
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
          external-dns.alpha.kubernetes.io/enabled: "true"
          external-dns.alpha.kubernetes.io/hostname: mainsail.saturn.ci
          external-dns.alpha.kubernetes.io/target: direct.saturn.ci
        hosts:
          - host: mainsail.saturn.ci
            paths:
              - path: /
                pathType: Prefix
        tls:
        - secretName: mainsail.saturn.ci
          hosts:
            - mainsail.saturn.ci
    orcaslicer:
      enabled: true

      image:
        repository: ghcr.io/linuxserver/orcaslicer
        tag: "2.3.2"

      resources:
        requests:
          cpu: 5m
          memory: 16Mi

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: orcaslicer-config

      volumeMounts:
        - name: config
          mountPath: /config

      ingress:
        enabled: true
        className: "traefik"
        annotations:
          kubernetes.io/ingress.class: traefik
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: OrcaSlicer
          gethomepage.dev/group: Home
          gethomepage.dev/icon: orcaslicer
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.middlewares: 'traefik-forwardauth-authelia@kubernetescrd'
          external-dns.alpha.kubernetes.io/enabled: "true"
          external-dns.alpha.kubernetes.io/hostname: orcaslicer.saturn.ci
          external-dns.alpha.kubernetes.io/target: direct.saturn.ci
        hosts:
          - host: orcaslicer.saturn.ci
            paths:
              - path: /
                pathType: Prefix
        tls:
        - secretName: orcaslicer.saturn.ci
          hosts:
            - orcaslicer.saturn.ci
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: klipper
            patch: |
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: serial-file
                  hostPath:
                    path: /dev/serial/by-id/
                    type: Directory
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: serial-file
                  mountPath: /dev/serial/by-id