apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: klipper-virtualsdcard
  namespace: klipper
  labels:
    recurring-job.longhorn.io/source: enabled
    recurring-job-group.longhorn.io/backup: enabled
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi