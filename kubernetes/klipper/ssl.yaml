apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: moonraker
  namespace: klipper
spec:
  secretName: moonraker.saturn.ci
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - moonraker.saturn.ci
