apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: minecraft
  namespace: flux-system
spec:
  interval: 1m
  path: ./kubernetes/minecraft
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system