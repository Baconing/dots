apiVersion: v1
kind: Namespace
metadata:
  name: syncthing
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: syncthing 
  namespace: flux-system
spec:
  interval: 1m
  path: ./kubernetes/syncthing
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: storage