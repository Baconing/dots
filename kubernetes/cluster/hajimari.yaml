apiVersion: v1
kind: Namespace
metadata:
  name: hajimari
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hajimari
  namespace: flux-system
spec:
  interval: 1m
  path: ./kubernetes/hajimari
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age