apiVersion: v1
kind: Namespace
metadata:
  name: media
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-storage
  namespace: flux-system
spec:
  interval: 1m
  path: ./kubernetes/media/storage
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: storage
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-apps
  namespace: flux-system
spec:
  interval: 1m
  path: ./kubernetes/media/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: media-storage