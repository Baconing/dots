apiVersion: v1
kind: Namespace
metadata:
  name: external
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external
  namespace: flux-system
spec:
  interval: 1m
  path: ./kubernetes/external
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system