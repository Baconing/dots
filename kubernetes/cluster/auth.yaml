apiVersion: v1
kind: Namespace
metadata:
  name: auth
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: auth-authelia
  namespace: flux-system
spec:
  interval: 1m
  path: ./kubernetes/auth/authelia
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: auth-lldap
    - name: database
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: auth-lldap
  namespace: flux-system
spec:
  interval: 1m
  path: ./kubernetes/auth/lldap
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age