apiVersion: v1
kind: PersistentVolume
metadata:
  name: media
  namespace: media
  labels:
    name: media
spec:
  accessModes: 
    - ReadWriteMany
  capacity:
    storage: 21Ti
  storageClassName: smb
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: phoebe.default.svc.cluster.local/media##
    volumeAttributes:
      source: //10.10.2.2/media
    nodeStageSecretRef:
      name: phoebe-smb-credentials
      namespace: default
  mountOptions:
    - dir_mode=0775
    - file_mode=0664
    - uid=1000
    - gid=1000
---
