[colors]
foreground = ${colors.white}
background = ${colors.black}

white = #eaeaea
black = #0f0f0f

red = #d74a49
green = #5cb85c

blue = #428bca
lightblue = #7fc4ff

[bar/main]
monitor = ${env:MONITOR:}

wm-restack = i3
override-redirect = true

font-0 = "MesloLGLDZ NF:weight=medium:pixelsize=11;0"

fixed-center = true

separator = "|"
separator-foreground = ${colors.lightblue}
module-margin = 1
height = 2.5%
width = 99%
offset-x = .5%
offset-y = .75%
radius = 5
padding-right = 1
bottom = true

line-size = 5

foreground = ${colors.foreground}
background = ${colors.background}

modules-left = i3 window
;tray-position = ${env:TRAY:}
modules-center = spotify
modules-right = xkeyboard battery cpu memory wired wireless pulseaudio date time powermenu

; planned modules:
; backlight
; battery
; date
; memory
; mpd (potentially)
; network
; pulseaudio
; temperature

[module/i3]
type = internal/i3

pin-workspaces = true
show-urgent = true

strip-wsnumbers = true
index-sort = true

enable-click = true
enable-scroll = false

fuzzy-match = true

format = <label-state>

label-focused = %name%
label-visible = %name%
label-unfocused = %name%
label-urgent = %name%

label-focused-padding = 1
label-unfocused-padding = 1
label-visible-padding = 1
label-urgent-padding = 1

label-focused-underline = ${colors.blue}
label-visible-underline = ${colors.blue}
label-unfocused-underline = ${colors.lightblue}
label-urgent-underline = ${colors.red}

[module/window]
type = custom/script
exec = python3 ~/.bin/windowpolybar.py
format = <label>
format-prefix = "[] = "
format-prefix-background = #111111

format-background = #1b4552

label = %output%
label-padding = 1
interval = .075

[module/spotify]
type = custom/script

interval = 1

format-prefix = " "
format-prefix-foreground = ${colors.blue}
format = <label>


exec = python ~/.bin/spotifypolybar.py -f '{artist}: {song}' --font=1 -t=500
click-left = playerctl --player=spotify play-pause
click-right = playerctl --player=spotify next
click-middle = playerctl --player=spotify previous

[module/xkeyboard]
type = internal/xkeyboard
format = <label-indicator>

format-foreground = ${colors.red}

label-indicator-on-capslock = בּ
label-indicator-on-numlock = 
label-indicator-on-scrolllock = 

[module/battery]
type = internal/battery

full-at = 99
low-at = 15

format-charging-prefix = " "
format-discharging-prefix = " "
format-full-prefix = " "
format-low-prefix = " "

format-charging-prefix-foreground = ${colors.blue}
format-discharging-prefix-foreground = ${colors.blue}
format-full-prefix-foreground = ${colors.green}
format-low-prefix-foreground = ${colors.red}

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>
format-low = <animation-low>

label-charging = Charging %percentage%% (%time% until full)
label-discharging = On Battery %percentage%% \ %consumption% W
label-full = Battery Full %percentage%%
; label-low = On Battery (Low) %percentage%% (%time% until drained)

animation-low-0 = On Battery (Low) %percentage%% (%time% until drained)
animation-low-1 = On Battery %percentage%% (%time% until drained)
animation-low-framerate = 200

format-low-foreground = #d9534f

[module/cpu]
type = internal/cpu
interval = 1

format = <label>
format-prefix = "﬙ "
format-prefix-foreground = #428bca

label = "%percentage%%"

[module/memory]
type = internal/memory
interval = 1

format = <label>
format-prefix = " "
format-prefix-foreground = #428bca

label = "%used%/%total%"

[module/wired]
type = internal/network

interface = enp39s0
interface-type = wired

interval = 2.5

format-connected = <label-connected>
format-disconnected = <label-disconnected>

format-connected-prefix = " "
format-disconnected-prefix = " "

format-connected-prefix-foreground = ${colors.blue}
format-disconnected-prefix-foreground = ${colors.blue}

label-connected =  %downspeed%  %upspeed%
label-disconnected = "Disconnected"

click-left = nm-connection-editor
click-right = nmcli disconnect enp39s0

[module/wireless]
type = internal/network

interface = wlp35s0
interface-type = wireless

interval = 2.5

format-connected = <label-connected>
format-disconnected = <label-disconnected>

format-connected-prefix = "直 " 
format-disconnected-prefix = "睊 "

format-connected-prefix-foreground = ${colors.blue}
format-disconnected-prefix-foreground = ${colors.blue}

label-connected = %{A1:nm-connection-editor:}%{A3:nmcli device disconnect wlp35s0:}%essid%  %downspeed%  %upspeed%%{A}%{A}
label-disconnected = %{A1:nm-connection-editor:}%{A3:nmcli device connect wlp35s0:}Disconnected%{A}%{A}

click-left = nm-connection-editor
click-right = nmcli disconnect wlp35s0

[module/pulseaudio]
type = internal/pulseaudio

interval = 1

format-volume = <label-volume>
format-muted = <label-volume>

format-volume-prefix= " "
format-muted-prefix = "婢 "

format-volume-prefix-foreground = #428bca
format-muted-prefix-foreground = #428bca

label-volume = "%percentage%%"

click-right = pavucontrol
click-left = pavucontrol

[module/date]
type = internal/date
interval = 1

date = %m/%d/%Y
date-alt = %B %d, %Y

format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.blue}

label = %date%


[module/time]
type = internal/date
interval = 1

time = %I:%M %p
time-alt = %I:%M:%S %p

format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.blue}

label = %time%


[module/powermenu]
type = custom/text

content = " "
content-foreground = ${colors.blue}

click-left = ~/.bin/powermenu
